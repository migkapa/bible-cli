name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build and test
        run: cargo test

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      # Commit the formula bump directly to the tap we own. This avoids the
      # fork-and-PR flow (which fails with HTTP 303 when the token owner already
      # owns the tap) and needs only push access to the single tap repo.
      - name: Bump formula in tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          tarball="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          sha="$(curl -fsSL "$tarball" | sha256sum | cut -d' ' -f1)"

          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/migkapa/homebrew-tap.git" tap
          cd tap

          formula="Formula/bible-cli.rb"
          sed -i -E "s|^  url \".*\"|  url \"${tarball}\"|" "$formula"
          sed -i -E "s|^  sha256 \".*\"|  sha256 \"${sha}\"|" "$formula"

          if git diff --quiet; then
            echo "Formula already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "bible-cli ${version}"
          git push
